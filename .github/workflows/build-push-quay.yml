name: Build and Push Runtime Images to Quay.io

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.spring-boot'
      - 'Dockerfile.quarkus'
      - 'Dockerfile'
      - 'Dockerfile.jhipster8-worker'
      - 'Dockerfile.pyhipster-worker'
      - 'jhipster8-worker/**'
      - 'pyhipster-worker/**'
      - 'Dockerfile.builder'
      - 'docker/**'
      - 'charts/**'
      - '.github/workflows/build-push-quay.yml'
      - 'pom.xml'
      - 'src/**'
      - 'package.json'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  QUAY_REPO: quay.io/maximilianopizarro/jhipster-online
  DEVFILE_REPO: quay.io/devfile/jhipster-online
  BUILDER_REPO: quay.io/maximilianopizarro/jhipster-universal-developer-image
  BUILDER_BASE_REPO: quay.io/maximilianopizarro/jhipster-builder
  BUILDER_DOTNET_REPO: quay.io/maximilianopizarro/jhipster-builder-dotnet
  BUILDER_NODE_REPO: quay.io/maximilianopizarro/jhipster-builder-node
  BUILDER_GO_REPO: quay.io/maximilianopizarro/jhipster-builder-go
  BUILDER_RUST_REPO: quay.io/maximilianopizarro/jhipster-builder-rust
  JHIPSTER8_WORKER_REPO: quay.io/maximilianopizarro/jhipster-online-jhipster8-worker
  PYHIPSTER_WORKER_REPO: quay.io/maximilianopizarro/jhipster-online-pyhipster-worker

jobs:
  build-quarkus:
    name: Build Quarkus Runtime Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Quarkus image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.quarkus
          push: true
          tags: |
            ${{ env.QUAY_REPO }}:${{ steps.version.outputs.version }}-quarkus
          labels: |
            org.opencontainers.image.title=JHipster Online (Quarkus)
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online
          cache-from: type=gha,scope=quarkus
          cache-to: type=gha,mode=max,scope=quarkus

  build-spring-boot:
    name: Build Spring Boot Runtime Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Spring Boot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.spring-boot
          push: true
          tags: |
            ${{ env.QUAY_REPO }}:${{ steps.version.outputs.version }}-spring-boot
          labels: |
            org.opencontainers.image.title=JHipster Online (Spring Boot)
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online
          cache-from: type=gha,scope=spring-boot
          cache-to: type=gha,mode=max,scope=spring-boot

  build-jhipster8-worker:
    name: Build JHipster 8 worker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push JHipster 8 worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jhipster8-worker
          push: true
          tags: |
            ${{ env.JHIPSTER8_WORKER_REPO }}:${{ steps.version.outputs.version }}-jhipster8-worker
          labels: |
            org.opencontainers.image.title=JHipster Online JHipster 8 worker
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online
          cache-from: type=gha,scope=jhipster8-worker
          cache-to: type=gha,mode=max,scope=jhipster8-worker

  build-pyhipster-worker:
    name: Build PyHipster worker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push PyHipster worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pyhipster-worker
          push: true
          tags: |
            ${{ env.PYHIPSTER_WORKER_REPO }}:${{ steps.version.outputs.version }}-pyhipster-worker
          labels: |
            org.opencontainers.image.title=JHipster Online PyHipster worker
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online
          cache-from: type=gha,scope=pyhipster-worker
          cache-to: type=gha,mode=max,scope=pyhipster-worker

  build-devspaces:
    name: Build Dev Spaces Workspace Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Dev Spaces image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DEVFILE_REPO }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=JHipster Online Dev Spaces
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online

  build-builder:
    name: Build Pipeline Builder Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          push: true
          tags: |
            ${{ env.BUILDER_REPO }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=JHipster Pipeline Builder
            org.opencontainers.image.description=JDK 21 + Maven 3.9 + Node 22 for Tekton pipelines
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

  build-stack-builders:
    name: Build stack-specific Quay builders (${{ matrix.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: jhipster-builder
            imageRepo: quay.io/maximilianopizarro/jhipster-builder
            dockerfile: docker/jhipster-builder/Containerfile
          - id: jhipster-builder-dotnet
            imageRepo: quay.io/maximilianopizarro/jhipster-builder-dotnet
            dockerfile: docker/jhipster-builder-dotnet/Containerfile
          - id: jhipster-builder-node
            imageRepo: quay.io/maximilianopizarro/jhipster-builder-node
            dockerfile: docker/jhipster-builder-node/Containerfile
          - id: jhipster-builder-go
            imageRepo: quay.io/maximilianopizarro/jhipster-builder-go
            dockerfile: docker/jhipster-builder-go/Containerfile
          - id: jhipster-builder-rust
            imageRepo: quay.io/maximilianopizarro/jhipster-builder-rust
            dockerfile: docker/jhipster-builder-rust/Containerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | sed 's/-SNAPSHOT//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.id }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.imageRepo }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=${{ matrix.id }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online
