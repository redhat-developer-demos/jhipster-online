name: Build and Push Builder Images to Quay.io

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.spring-boot'
      - 'Dockerfile.quarkus'
      - 'Dockerfile'
      - '.github/workflows/build-push-quay.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  QUAY_REPO: quay.io/maximilianopizarro/jhipster-online
  DEVFILE_REPO: quay.io/devfile/jhipster-online

jobs:
  build-spring-boot:
    name: Build Spring Boot Builder Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Spring Boot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.spring-boot
          push: true
          tags: |
            ${{ env.QUAY_REPO }}:spring-boot
            ${{ env.QUAY_REPO }}:${{ steps.version.outputs.version }}-spring-boot
            ${{ env.QUAY_REPO }}:latest
          labels: |
            org.opencontainers.image.title=JHipster Online Builder (Spring Boot)
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online

  build-quarkus:
    name: Build Quarkus Builder Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Quarkus image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.quarkus
          push: true
          tags: |
            ${{ env.QUAY_REPO }}:quarkus
            ${{ env.QUAY_REPO }}:${{ steps.version.outputs.version }}-quarkus
          labels: |
            org.opencontainers.image.title=JHipster Online Builder (Quarkus)
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online

  build-devspaces:
    name: Build Dev Spaces Workspace Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Red Hat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Dev Spaces image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DEVFILE_REPO }}:${{ steps.version.outputs.version }}
            ${{ env.DEVFILE_REPO }}:latest
          labels: |
            org.opencontainers.image.title=JHipster Online Dev Spaces
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/redhat-developer-demos/jhipster-online
