# Full stack for local testing: podman compose up --build
# App: http://localhost:8080  |  MailHog UI: http://localhost:8025
services:
  mysql:
    image: docker.io/library/mysql:8.2.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: jhipster-online
    ports:
      - '3306:3306'
    command: mysqld --lower_case_table_names=1 --skip-ssl --character_set_server=utf8mb4 --explicit_defaults_for_timestamp
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailhog:
    image: docker.io/mailhog/mailhog:latest
    ports:
      - '1025:1025'
      - '8025:8025'

  jhipster8-worker:
    build:
      context: .
      dockerfile: Dockerfile.jhipster8-worker
    ports:
      - '8081:8081'

  pyhipster-worker:
    build:
      context: .
      dockerfile: Dockerfile.pyhipster-worker
    ports:
      - '8082:8082'

  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: prod,local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jhipster-online?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ''
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: '1025'
      APPLICATION_JHIPSTER8WORKER_ENABLED: 'true'
      APPLICATION_JHIPSTER8WORKER_BASE_URL: http://jhipster8-worker:8081
      APPLICATION_PYHIPSTERWORKER_ENABLED: 'true'
      APPLICATION_PYHIPSTERWORKER_BASE_URL: http://pyhipster-worker:8082
      JHIPSTER_SLEEP: '30'
    depends_on:
      mysql:
        condition: service_healthy
      mailhog:
        condition: service_started
      jhipster8-worker:
        condition: service_started
      pyhipster-worker:
        condition: service_started

volumes:
  mysql-data:
