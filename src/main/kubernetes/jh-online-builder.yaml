apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: jhipster-online-builder
---
# Target image for the jh-online binary (WAR) build; must exist or BuildConfig output fails.
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: jhipster-online
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: jhipster-online-builder
spec:
  nodeSelector: null
  output:
    to:
      kind: ImageStreamTag
      name: 'jhipster-online-builder:latest'
  resources: {}
  successfulBuildsHistoryLimit: 5
  failedBuildsHistoryLimit: 5
  strategy:
    type: Docker
    dockerStrategy:
      from:
        kind: DockerImage
        name: 'registry.redhat.io/ubi8/openjdk-17@sha256:af305e087061cbaa4107ce0b304a1ef987f6b54bae3f75bfd529cfd084cba9b5'
  postCommit: {}
  source:
    type: Dockerfile
    dockerfile: "FROM registry.redhat.io/ubi8/openjdk-17@sha256:af305e087061cbaa4107ce0b304a1ef987f6b54bae3f75bfd529cfd084cba9b5\r\n\r\nUSER root \r\n\r\nRUN microdnf install -y unzip\r\n\r\nWORKDIR /usr/share/maven\r\n\r\nRUN rm -rf /usr/share/maven/* /usr/bin/mvn\r\n\r\nRUN curl -L -o apache-maven-3.9.15-bin.zip https://dlcdn.apache.org/maven/maven-3/3.9.15/binaries/apache-maven-3.9.15-bin.zip\r\n\r\nRUN unzip apache-maven-3.9.15-bin.zip \"apache-maven-3.9.15/*\" -d \"/usr/share/maven\"\r\n\r\nRUN ln -s /usr/share/maven/apache-maven-3.9.15/bin/mvn /usr/bin/mvn\r\n\r\nRUN rm -rf apache-maven-3.9.15-bin.zip\r\n\r\nENV MAVEN_VERSION=3.9.15\r\n\r\nENV MAVEN_OPTS=\"-Xmx3489m\"\r\n\r\nENV JAVA_TOOL_OPTION=\"-Xmx3489m\"\r\n\r\nENV M2_HOME=/usr/share/maven/apache-maven-3.9.15/bin\r\n\r\nENV PATH=$PATH:/usr/share/maven/apache-maven-3.9.15/bin\r\n\r\nRUN chown 1001:0 ${M2_HOME} && chgrp -R 0 ${M2_HOME} && chmod -R g=u ${M2_HOME}\r\n\r\nENV NODE_VERSION=22.19.0\r\n\r\nENV PATH=/usr/local/bin:$PATH\r\n\r\nRUN microdnf install -y tar xz gzip curl git && ARCH=$(uname -m) && case \"$ARCH\" in x86_64) NODE_ARCH=x64 ;; aarch64) NODE_ARCH=arm64 ;; ppc64le) NODE_ARCH=ppc64le ;; s390x) NODE_ARCH=s390x ;; *) echo \"unsupported arch: $ARCH\"; exit 1 ;; esac && curl -fsSL \"https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz\" -o /tmp/node.tar.xz && tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1 && rm -f /tmp/node.tar.xz && npm install -g generator-jhipster@9.0.0 generator-jhipster-quarkus@3.6.0 && microdnf clean all\r\n\r\n\r\nUSER 1001"
  runPolicy: Serial
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: jh-online
spec:
  nodeSelector: null
  output:
    to:
      kind: ImageStreamTag
      name: 'jhipster-online:quarkus'
  resources: {}
  successfulBuildsHistoryLimit: 5
  failedBuildsHistoryLimit: 5
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: DockerImage
        #        name: 'image-registry.openshift-image-registry.svc:5000/maximilianopizarro5-dev/jhipster-online-builder:latest'
        name: 'quay.io/maximilianopizarro/jhipster-online:2.40.0-quarkus'
      # Incremental S2I can restore an older /deployments WAR from the previous image layer; keep false for binary WAR replaces.
      incremental: false
  postCommit: {}
  source:
    type: Binary
    binary: {}
  runPolicy: Serial
