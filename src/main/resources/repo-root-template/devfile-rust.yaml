schemaVersion: 2.3.0
metadata:
  name: __REPO_NAME__
  version: 2.41.1
  description: 'JHipster Rust stack on Red Hat OpenShift Dev Spaces.'
  displayName: __REPO_NAME__
  icon: https://raw.githubusercontent.com/redhat-developer-demos/jhipster-online/main/jhipster-icon.png
  website: https://www.jhipster.tech
  tags:
    - Rust
    - JHipster
  language: Rust
  projectType: rust
projects:
  - name: __REPO_NAME__
    git:
      remotes:
        origin: '__GIT_REPO_URL__'
      checkoutFrom:
        revision: main
components:
  - name: tools
    container:
      image: '__DEVFILE_IMAGE__'
      mountSources: true
      cpuLimit: '4'
      cpuRequest: '1'
      memoryLimit: '8G'
      memoryRequest: '4G'
      volumeMounts:
        - name: cargo
          path: /home/user/.cargo
      endpoints:
        - exposure: public
          name: webapp
          protocol: https
          targetPort: 8080
  - name: cargo
    volume:
      size: 1Gi
commands:
  - id: cargo-build
    exec:
      label: 'Build application'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'cargo build'
      group:
        kind: build
        isDefault: true
  - id: cargo-run
    exec:
      label: 'Run application'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'cargo run'
      group:
        kind: run
        isDefault: true
