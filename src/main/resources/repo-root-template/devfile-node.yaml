schemaVersion: 2.3.0
metadata:
  name: __REPO_NAME__
  version: 2.41.0
  description: 'JHipster Node.js / NestJS stack on Red Hat OpenShift Dev Spaces.'
  displayName: __REPO_NAME__
  icon: https://raw.githubusercontent.com/redhat-developer-demos/jhipster-online/main/jhipster-icon.png
  website: https://www.jhipster.tech
  tags:
    - Node.js
    - JHipster
  language: TypeScript
  projectType: nodejs
projects:
  - name: __REPO_NAME__
    git:
      remotes:
        origin: '__GIT_REPO_URL__'
      checkoutFrom:
        revision: main
components:
  - name: tools
    container:
      image: '__DEVFILE_IMAGE__'
      mountSources: true
      cpuLimit: '4'
      cpuRequest: '1'
      memoryLimit: '8G'
      memoryRequest: '4G'
      volumeMounts:
        - name: npm
          path: /home/user/.npm
      endpoints:
        - exposure: public
          name: webapp
          protocol: https
          targetPort: 3000
      env:
        - name: NODE_ENV
          value: development
  - name: npm
    volume:
      size: 512Mi
commands:
  - id: npm-install
    exec:
      label: 'Install dependencies'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'npm install'
      group:
        kind: build
        isDefault: true
  - id: npm-build
    exec:
      label: 'Build for production'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'npm run build:prod || npm run build || true'
      group:
        kind: build
        isDefault: false
  - id: npm-start
    exec:
      label: 'Start application'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'npm start'
      group:
        kind: run
        isDefault: true
