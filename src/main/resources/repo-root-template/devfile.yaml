# OpenShift Dev Spaces devfile for the generated application.
# Tokens are replaced at generation time by JHipster Online.
schemaVersion: 2.3.0
metadata:
  name: __REPO_NAME__
  version: 2.40.1
  description: 'JHipster stack on Red Hat OpenShift Dev Spaces (JDK 21).'
  displayName: __REPO_NAME__
  icon: https://raw.githubusercontent.com/redhat-developer-demos/jhipster-online/main/jhipster-icon.png
  website: https://www.jhipster.tech
  tags:
    - Java
    - JHipster
  language: Java
  projectType: springboot
projects:
  - name: __REPO_NAME__
    git:
      remotes:
        origin: '__GIT_REPO_URL__'
      checkoutFrom:
        revision: main
components:
  - name: tools
    container:
      image: '__DEVFILE_IMAGE__'
      mountSources: true
      cpuLimit: '4'
      cpuRequest: '1'
      memoryLimit: '8G'
      memoryRequest: '4G'
      volumeMounts:
        - name: m2
          path: /home/user/.m2
        - name: config
          path: /home/user/.config
        - name: npm
          path: /home/user/.npm
      endpoints:
        - exposure: public
          name: backend
          protocol: https
          targetPort: 8080
        - exposure: public
          name: debug
          targetPort: 4200
        - exposure: public
          name: frontend
          protocol: https
          targetPort: 9000
        - exposure: public
          name: debug-frontend
          protocol: https
          targetPort: 9001
        - exposure: public
          name: browser-sync
          protocol: https
          targetPort: 3001
      env:
        - value: '-XX:MaxRAMPercentage=50.0 -XX:+UseParallelGC -XX:MinHeapFreeRatio=10 -XX:MaxHeapFreeRatio=20 -XX:GCTimeRatio=4 -XX:AdaptiveSizePolicyWeight=90 -Dsun.zip.disableMemoryMapping=true -Xms20m -Djava.security.egd=file:/dev/./urandom -Duser.home=/home/jboss'
          name: JAVA_OPTS
        - value: $(JAVA_OPTS)
          name: MAVEN_OPTS
  - name: m2
    volume:
      size: 512Mi
  - name: config
    volume:
      size: 512Mi
  - name: npm
    volume:
      size: 512Mi
commands:
  - id: kubectl-add-mysql
    exec:
      label: 'Kubernetes apply MariaDB Instance (Kubernetes cluster)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'kubectl apply -f src/main/kubernetes/preset-mariadb-standalone.yaml'
  - id: oc-add-mysql
    exec:
      label: 'OpenShift apply MariaDB Instance (OpenShift cluster)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'oc apply -f src/main/kubernetes/preset-mariadb-standalone.yaml'
  - id: kubectl-add-postgresql
    exec:
      label: 'Kubernetes apply PostgreSQL (Red Hat registry image)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'kubectl apply -f src/main/kubernetes/preset-postgresql-redhat.yaml'
  - id: kubectl-add-mongodb
    exec:
      label: 'Kubernetes apply MongoDB (Docker Hub image)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'kubectl apply -f src/main/kubernetes/preset-mongodb.yaml'
  - id: oc-remove-mysql
    exec:
      label: 'OpenShift remove MariaDB Instance (OpenShift cluster)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'oc delete all --selector app=mariadb'
  - id: oc-add-postgresql
    exec:
      label: 'OpenShift apply PostgreSQL (Red Hat registry image)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'oc apply -f src/main/kubernetes/preset-postgresql-redhat.yaml'
  - id: oc-remove-postgresql
    exec:
      label: 'OpenShift remove PostgreSQL instance'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'oc delete all --selector app=postgresql'
  - id: oc-add-mongodb
    exec:
      label: 'OpenShift apply MongoDB (Docker Hub image)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'oc apply -f src/main/kubernetes/preset-mongodb.yaml'
  - id: oc-remove-mongodb
    exec:
      label: 'OpenShift remove MongoDB instance'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'oc delete all --selector app=mongodb'
  - id: npm-install
    exec:
      label: 'Package the application'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'npm install'
      group:
        kind: build
        isDefault: true
  - id: nest-or-node-build
    exec:
      label: 'Node / NestJS production build (when package.json defines the script)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'npm run build:prod || npm run webapp:prod || npm run build || true'
      group:
        kind: build
        isDefault: false
  - id: start-frontend
    exec:
      label: 'Start Frontend'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'npm start'
      group:
        kind: run
        isDefault: true
  - id: start-backend
    exec:
      label: 'Start application (Maven)'
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: 'chmod 777 ./mvnw && ./mvnw'
      group:
        kind: run
        isDefault: false
