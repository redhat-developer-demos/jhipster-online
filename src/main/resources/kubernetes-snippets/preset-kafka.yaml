# =============================================================================
# AMQ Streams / Strimzi Kafka (OpenShift Operator: "Red Hat Integration - AMQ Streams")
# =============================================================================
# - Kafka and ZooKeeper images are supplied by the operator from registry.redhat.io/amq-streams/* (certified).
# - Enable app wiring: helm/values.yaml → integrations.kafka.enabled: true
#   Bootstrap (plain listener): {{ .Values.app.name }}-kafka-kafka-bootstrap:9092
# - Helm tokens expand only when this YAML is under helm/templates/ or post-rendered; plain kubectl will not
#   substitute {{ .Values.app.name }}.
# - Production: use persistent storage, kafka.replicas / zookeeper.replicas >= 3, and replication.factor >= 3.
# =============================================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: '{{ .Values.app.name }}-kafka'
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
    app.kubernetes.io/name: kafka
    app.openshift.io/runtime: kafka
spec:
  kafka:
    version: 3.8.0
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: '3.8'
    storage:
      type: ephemeral
    resources:
      requests:
        memory: 768Mi
        cpu: '250m'
      limits:
        memory: 2Gi
  zookeeper:
    replicas: 1
    storage:
      type: ephemeral
    resources:
      requests:
        memory: 384Mi
        cpu: '100m'
      limits:
        memory: 1Gi
  entityOperator:
    topicOperator: {}
    userOperator: {}
