# image.namespace is __TARGET_NAMESPACE__ in Git on purpose: JHipster Online replaces it in-cluster when you
# deploy with method "fabric8", or injects it via Argo CD helm parameters when you deploy with "argocd".
app:
  name: __REPO_NAME__
framework: __FRAMEWORK__
git:
  repoUrl: __GIT_REPO_URL__
image:
  namespace: __TARGET_NAMESPACE__
  stream: __REPO_NAME__
route:
  enabled: true
replicas:
  app: 1
  mariadb: 1
deploy:
  method: fabric8
tekton:
  defaultBranch: main
  pathContext: __TEKTON_PATH_CONTEXT__
  timeout: 1h0m0s
database:
  prodType: __PROD_DATABASE_TYPE__
# Tekton / dev workspaces builder (align with CI image tags; avoid floating latest in production).
builder:
  image: __BUILDER_IMAGE__
# Runtime images for non-JVM stacks (Red Hat catalog — verify tags in https://catalog.redhat.com before production).
runtime:
  dotnet:
    image: registry.access.redhat.com/ubi8/dotnet-80-runtime:8.0
    sdkImage: registry.access.redhat.com/ubi8/dotnet-80:8.0
  node:
    image: registry.access.redhat.com/ubi8/nodejs-20-minimal:1
    buildImage: registry.access.redhat.com/ubi8/nodejs-20:1
# Toggle wiring in helm/templates/deployment.yaml (Spring / Quarkus) for optional extras from
# src/main/kubernetes/jh-online-kubernetes-extras.yaml (Kafka, Redis, Keycloak issuer URI).
rbac:
  create: true
integrations:
  kafka:
    enabled: false
  redis:
    enabled: false
  keycloak:
    enabled: false
    # Example: https://<route-host>/realms/jhipster
    issuerUri: ''
  # Hot Rod / remote cache: map env vars in deployment yourself (Spring/Quarkus property names vary by stack).
  infinispan:
    enabled: false
    serverList: ''
