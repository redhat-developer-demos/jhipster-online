{{- if eq .Values.database.prodType "postgresql" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-{{ .Values.app.name }}
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
    app.kubernetes.io/part-of: '{{ .Values.app.name }}'
    app.kubernetes.io/name: postgresql-{{ .Values.app.name }}
    app.openshift.io/runtime: postgresql
spec:
  strategy:
    type: Recreate
  replicas: {{ .Values.replicas.mariadb }}
  selector:
    matchLabels:
      app: postgresql-{{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: postgresql-{{ .Values.app.name }}
        app.kubernetes.io/managed-by: jhipster-online
        app.kubernetes.io/instance: '{{ .Values.app.name }}'
        app.kubernetes.io/part-of: '{{ .Values.app.name }}'
        deployment: postgresql-{{ .Values.app.name }}
        app.openshift.io/runtime: postgresql
    spec:
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: postgresql-{{ .Values.app.name }}-data
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-{{ .Values.app.name }}
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-{{ .Values.app.name }}
                  key: database-password
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgresql-{{ .Values.app.name }}
                  key: database-name
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/pgsql/data
          resources:
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - '-i'
                - '-c'
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - '-i'
                - '-c'
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
      restartPolicy: Always
{{- end }}
