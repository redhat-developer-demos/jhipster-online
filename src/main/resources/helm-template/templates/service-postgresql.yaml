{{- if eq .Values.database.prodType "postgresql" }}
apiVersion: v1
kind: Service
metadata:
  name: postgresql-{{ .Values.app.name }}
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
    app.kubernetes.io/part-of: '{{ .Values.app.name }}'
    app.kubernetes.io/name: postgresql-{{ .Values.app.name }}
spec:
  ports:
    - name: 5432-tcp
      protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app: postgresql-{{ .Values.app.name }}
    deployment: postgresql-{{ .Values.app.name }}
{{- end }}
