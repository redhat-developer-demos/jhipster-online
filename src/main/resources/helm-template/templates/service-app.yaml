apiVersion: v1
kind: Service
metadata:
  name: { { .Values.app.name } }
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: { { .Values.app.name } }
    app.kubernetes.io/name: { { .Values.app.name } }
spec:
  ports:
    - name: 8080-tcp
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    app: { { .Values.app.name } }
    deployment: { { .Values.app.name } }
