{{- if eq .Values.database.prodType "postgresql" }}
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-{{ .Values.app.name }}
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
    app.kubernetes.io/part-of: '{{ .Values.app.name }}'
    app.kubernetes.io/name: postgresql-{{ .Values.app.name }}
    app.openshift.io/runtime: postgresql
  annotations:
    template.openshift.io/expose-database_name: "{.data['database-name']}"
    template.openshift.io/expose-password: "{.data['database-password']}"
    template.openshift.io/expose-username: "{.data['database-user']}"
data:
  database-name: amhpcHN0ZXJvbmxpbmU=
  database-password: amhpcHN0ZXI=
  database-user: amhpcHN0ZXI=
type: Opaque
{{- end }}
