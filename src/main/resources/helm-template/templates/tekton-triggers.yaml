# Tekton Triggers: webhook POST from GitHub/GitLab/Gitea to EventListener triggers a PipelineRun.
# The CEL interceptor normalizes the payload across providers to extract repo URL and branch.
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: '{{ .Values.app.name }}-webhook-binding'
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
spec:
  params:
    - name: gitrepository
      value: $(extensions.git_url)
    - name: gitrevision
      value: $(extensions.git_branch)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: '{{ .Values.app.name }}-webhook-template'
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
spec:
  params:
    - name: gitrepository
      default: '{{ .Values.git.repoUrl }}'
    - name: gitrevision
      default: '{{ .Values.tekton.defaultBranch }}'
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: '{{ .Values.app.name }}-'
        labels:
          app.kubernetes.io/managed-by: jhipster-online
          app.kubernetes.io/instance: '{{ .Values.app.name }}'
          tekton.dev/pipeline: '{{ .Values.app.name }}'
      spec:
        pipelineRef:
          name: '{{ .Values.app.name }}'
        params:
          - name: GIT_REPO
            value: $(tt.params.gitrepository)
          - name: GIT_BRANCH
            value: $(tt.params.gitrevision)
          - name: MAVEN_IMAGE
            value: '{{ .Values.builder.image }}'
          - name: APP_JAR_VERSION
            value: '{{ .Values.tekton.appJarVersion }}'
          - name: APP_NAME
            value: '{{ .Values.app.name }}'
          - name: PATH_CONTEXT
            value: '{{ .Values.tekton.pathContext }}'
          - name: IMAGE_NAME
            value: 'image-registry.openshift-image-registry.svc:5000/{{ .Values.image.namespace }}/{{ .Values.app.name }}'
        taskRunTemplate:
          serviceAccountName: pipeline
        timeouts:
          pipeline: '{{ .Values.tekton.timeout }}'
        workspaces:
          - name: workspace
            persistentVolumeClaim:
              claimName: '{{ .Values.app.name }}-workspace'
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: '{{ .Values.app.name }}-git'
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
spec:
  serviceAccountName: pipeline
  triggers:
    - name: webhook-run
      interceptors:
        - ref:
            name: 'cel'
          params:
            - name: 'overlays'
              value:
                - key: git_url
                  expression: >-
                    has(body.repository.clone_url) ? body.repository.clone_url :
                    (has(body.project) && has(body.project.git_http_url) ? body.project.git_http_url :
                    '{{ .Values.git.repoUrl }}')
                - key: git_branch
                  expression: >-
                    has(body.ref) ? body.ref.split('/')[size(body.ref.split('/')) - 1] :
                    '{{ .Values.tekton.defaultBranch }}'
      bindings:
        - ref: '{{ .Values.app.name }}-webhook-binding'
      template:
        ref: '{{ .Values.app.name }}-webhook-template'
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: '{{ .Values.app.name }}-el'
  labels:
    app.kubernetes.io/managed-by: jhipster-online
    app.kubernetes.io/instance: '{{ .Values.app.name }}'
spec:
  to:
    kind: Service
    name: 'el-{{ .Values.app.name }}-git'
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Allow
