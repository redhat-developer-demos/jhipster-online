# ===================================================================
# Spring Boot configuration for the "prod" profile.
#
# This configuration overrides the application.yml file.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

logging:
  level:
    ROOT: INFO
    io.github.jhipster: INFO
    io.github.jhipster.online: INFO

management:
  metrics:
    export:
      prometheus:
        enabled: false

spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/jhipster-online?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password:
    hikari:
      poolName: Hikari
      auto-commit: false
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  jpa:
    show-sql: false
  # Replace by 'prod, faker' to add the faker context and have sample data loaded in production
  liquibase:
    contexts: prod
  mail:
    host: localhost
    port: 25
    username:
    password:
  thymeleaf:
    cache: true

# ===================================================================
# To enable TLS in production, generate a certificate using:
# keytool -genkey -alias jhonline -storetype PKCS12 -keyalg RSA -keysize 2048 -keystore keystore.p12 -validity 3650
#
# You can also use Let's Encrypt:
# https://maximilian-boehm.com/hp2121/Create-a-Java-Keystore-JKS-from-Let-s-Encrypt-Certificates.htm
#
# Then, modify the server.ssl properties so your "server" configuration looks like:
#
# server:
#    port: 443
#    ssl:
#        key-store: classpath:config/tls/keystore.p12
#        key-store-password: password
#        key-store-type: PKCS12
#        key-alias: jhonline
#        # The ciphers suite enforce the security by deactivating some old and deprecated SSL cipher, this list was tested against SSL Labs (https://www.ssllabs.com/ssltest/)
#        ciphers: TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 ,TLS_DHE_RSA_WITH_AES_128_GCM_SHA256 ,TLS_DHE_RSA_WITH_AES_256_GCM_SHA384 ,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384,TLS_DHE_RSA_WITH_AES_128_CBC_SHA256,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA256,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_RSA_WITH_AES_128_GCM_SHA256,TLS_RSA_WITH_AES_256_GCM_SHA384,TLS_RSA_WITH_AES_128_CBC_SHA256,TLS_RSA_WITH_AES_256_CBC_SHA256,TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_CAMELLIA_256_CBC_SHA,TLS_RSA_WITH_CAMELLIA_256_CBC_SHA,TLS_DHE_RSA_WITH_CAMELLIA_128_CBC_SHA,TLS_RSA_WITH_CAMELLIA_128_CBC_SHA
# ===================================================================
server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css, application/javascript, application/json
    min-response-size: 1024
  forward-headers-strategy: framework

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  http:
    cache: # Used by the CachingHttpHeadersFilter
      timeToLiveInDays: 1461
  cache: # Cache configuration
    ehcache: # Ehcache configuration
      time-to-live-seconds: 3600 # By default objects stay 1 hour in the cache
      max-entries: 1000 # Number of objects in each cache entry
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        # As this is the PRODUCTION configuration, you MUST change the default key, and store it securely:
        # - In the JHipster Registry (which includes a Spring Cloud Config server)
        # - In a separate `application-prod.yml` file, in the same folder as your executable JAR file
        # - In the `JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET` environment variable
        base64-secret: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        # Token is valid 24 hours
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  mail: # specific JHipster mail property, for standard properties see MailProperties
    from: jhipster-online@jhipster.tech
    base-url: http://my-server-url-to-change # Modify according to your server's URL
  logging:
    use-json-format: false # By default, logs are not in Json format
  audit-events:
    retention-period: 30 # Number of days before audit events are deleted.

# ===================================================================
# Application specific properties
# Add your own application properties here, see the ApplicationProperties class
# to have type-safe configuration, like in the JHipsterProperties above
#
# More documentation is available at:
# https://www.jhipster.tech/common-application-properties/
# ===================================================================

application:
  tmp-folder: /tmp
  jhipster-cmd:
    cmd: jhipster
    timeout: 120
  # JDL AI: Developer Sandbox shared GPU models (namespace sandbox-shared-models). See README / Red Hat learning path.
  # Enable with APPLICATION_JDL_AI_ENABLED=true and set APPLICATION_JDL_AI_API_KEY to a Bearer token (e.g. oc whoami -t).
  jdl-ai:
    enabled: ${APPLICATION_JDL_AI_ENABLED:false}
    default-model-id: ${APPLICATION_JDL_AI_DEFAULT_MODEL_ID:granite-31-8b}
    api-key: ${APPLICATION_JDL_AI_API_KEY:}
    insecure-tls: ${APPLICATION_JDL_AI_INSECURE_TLS:true}
    api-url: ''
    model: ''
    help-text: '${APPLICATION_JDL_AI_HELP_TEXT:GPU models from sandbox-shared-models (IBM Granite, NVIDIA Nemotron, Qwen3). Use a cluster token with access to that namespace.}'
    rag-enabled: true
    rag-top-k: 6
    rag-max-chars: 14000
    rag-semantic-enabled: ${APPLICATION_JDL_AI_RAG_SEMANTIC_ENABLED:false}
    embeddings-url: ${APPLICATION_JDL_AI_EMBEDDINGS_URL:}
    embeddings-model: ${APPLICATION_JDL_AI_EMBEDDINGS_MODEL:text-embedding-3-small}
    models:
      - id: granite-31-8b
        label: IBM Granite 3.1 8B (FP8)
        model: isvc-granite-31-8b-fp8
        api-url: https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions
      - id: nemotron-nano-9b-v2
        label: NVIDIA Nemotron Nano 9B v2 (FP8)
        model: isvc-nemotron-nano-9b-v2-fp8
        api-url: https://isvc-nemotron-nano-9b-v2-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions
      - id: qwen3-8b
        label: Qwen3 8B (FP8)
        model: isvc-qwen3-8b-fp8
        api-url: https://isvc-qwen3-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions
  helm-template:
    package-chart-repository-on-generate: ${APPLICATION_HELM_TEMPLATE_PACKAGE_CHART_REPOSITORY_ON_GENERATE:true}
    chart-repository-index-base-url: ${APPLICATION_HELM_TEMPLATE_CHART_REPOSITORY_INDEX_BASE_URL:}
  jhipster8-worker:
    enabled: ${APPLICATION_JHIPSTER8WORKER_ENABLED:false}
    base-url: ${APPLICATION_JHIPSTER8WORKER_BASE_URL:http://jhipster8-worker:8081}
    timeout-seconds: ${APPLICATION_JHIPSTER8WORKER_TIMEOUT_SECONDS:600}
  pyhipster-worker:
    enabled: ${APPLICATION_PYHIPSTERWORKER_ENABLED:false}
    base-url: ${APPLICATION_PYHIPSTERWORKER_BASE_URL:http://pyhipster-worker:8082}
    timeout-seconds: ${APPLICATION_PYHIPSTERWORKER_TIMEOUT_SECONDS:600}
  mcp-worker:
    enabled: ${APPLICATION_MCPWORKER_ENABLED:false}
    base-url: ${APPLICATION_MCPWORKER_BASE_URL:http://mcp-worker:8083}
    timeout-seconds: ${APPLICATION_MCPWORKER_TIMEOUT_SECONDS:120}

