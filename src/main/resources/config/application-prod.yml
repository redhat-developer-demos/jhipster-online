openshift:
  argocd:
    application-namespace: openshift-gitops
  deployment:
    enabled: true
    # Optional: always offer this namespace first in UI (e.g. your Developer Sandbox project).
    default-namespace: ${OPENSHIFT_DEPLOYMENT_DEFAULT_NAMESPACE:}
    use-helm-cli: ${OPENSHIFT_USE_HELM_CLI:true}
    helm-binary: ${OPENSHIFT_HELM_BINARY:helm}
    helm-timeout-seconds: ${OPENSHIFT_HELM_TIMEOUT_SECONDS:600}
    helm-fallback-to-fabric8: ${OPENSHIFT_HELM_FALLBACK_TO_FABRIC8:true}
