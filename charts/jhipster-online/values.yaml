# Minimal install: set generatorProfile: single, defaultStack: quarkus, jhipster8Worker.enabled: false, pyhipsterWorker.enabled: false, and all workers.*.enabled: false.
# Example multi (Quarkus + .NET workers): see commented block at bottom of this file.
nameOverride: ''

jhipsterOnline:
  generatorProfile: single
  defaultStack: quarkus
  image:
    repository: quay.io/maximilianopizarro/jhipster-online
    tag: "2.40.1-quarkus"
  replicas: 1
  generator:
    cmd: jhipster
  workers:
    quarkus:
      enabled: false
      replicas: 1
      image:
        repository: quay.io/maximilianopizarro/jhipster-online
        tag: "2.40.1-quarkus"
    springBoot:
      enabled: false
      replicas: 1
      image:
        repository: quay.io/maximilianopizarro/jhipster-online
        tag: "2.40.1-spring-boot"
    micronaut:
      enabled: false
      replicas: 1
      image:
        repository: quay.io/maximilianopizarro/jhipster-online
        tag: "2.40.1-micronaut"
    dotnet:
      enabled: false
      replicas: 1
      image:
        repository: quay.io/maximilianopizarro/jhipster-online
        tag: "2.40.1-dotnet"
    azureAca:
      enabled: false
      replicas: 0
      image: {}
    node:
      enabled: false
      replicas: 1
      image:
        repository: quay.io/maximilianopizarro/jhipster-builder-node
        tag: "0.1.0-builder-node"
    go:
      enabled: false
      replicas: 1
      image:
        repository: quay.io/maximilianopizarro/jhipster-builder-go
        tag: "0.1.0-builder-go"
    rust:
      enabled: false
      replicas: 1
      image:
        repository: quay.io/maximilianopizarro/jhipster-builder-rust
        tag: "0.1.0-builder-rust"
  routing:
    mode: local-process

# JHipster 8 HTTP sidecar: generator-jhipster@8.11 + dotnet / nodejs / azure-container-apps blueprints.
# When enabled, deploys a second Deployment + Service and sets env on the main app to delegate those stacks.
jhipster8Worker:
  enabled: false
  port: 8081
  timeoutSeconds: 600
  replicas: 1
  image:
    repository: quay.io/maximilianopizarro/jhipster-online-jhipster8-worker
    tag: "2.40.1-jhipster8-worker"

# PyHipster HTTP sidecar (Yeoman 5). Separate from jhipster8-worker due to incompatible Yeoman major versions.
pyhipsterWorker:
  enabled: false
  port: 8082
  timeoutSeconds: 600
  replicas: 1
  image:
    repository: quay.io/maximilianopizarro/jhipster-online-pyhipster-worker
    tag: "2.40.1-pyhipster-worker"

# Example (documented): multi profile with Quarkus + .NET workers enabled — requires app-side routing to workers.
# jhipsterOnline:
#   generatorProfile: multi
#   defaultStack: quarkus
