{{- if .Values.pyhipsterWorker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jhipster-online.name" . }}-pyhipster-worker
  labels:
    app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
    app.kubernetes.io/component: pyhipster-worker
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.pyhipsterWorker.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
    app.kubernetes.io/component: pyhipster-worker
{{- end }}
