{{- if .Values.jhipster8Worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jhipster-online.name" . }}-jhipster8-worker
  labels:
    app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
    app.kubernetes.io/component: jhipster8-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.jhipster8Worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
      app.kubernetes.io/component: jhipster8-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
        app.kubernetes.io/component: jhipster8-worker
    spec:
      containers:
        - name: jhipster8-worker
          image: "{{ .Values.jhipster8Worker.image.repository }}:{{ .Values.jhipster8Worker.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.jhipster8Worker.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
