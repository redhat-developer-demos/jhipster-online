apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jhipster-online.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.jhipsterOnline.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
    spec:
      containers:
        - name: jhipster-online
          image: "{{ .Values.jhipsterOnline.image.repository }}:{{ .Values.jhipsterOnline.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod,api-docs
